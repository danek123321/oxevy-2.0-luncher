<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#0052FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00BFA5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Inner glow circle -->
  <circle cx="256" cy="230" r="120" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.4"/>
  <circle cx="256" cy="230" r="90" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  <!-- "O" letter -->
  <text x="256" y="260" font-family="Arial, Helvetica, sans-serif" font-size="180" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">O</text>
  <!-- Small subtitle -->
  <text x="256" y="410" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="8">OXEVY</text>
</svg>